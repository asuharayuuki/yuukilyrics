name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show build environment
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: |
          flutter build apk --release 2>&1 | tee build.log

      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD"

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"

          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK file not found at $APK_PATH"
            exit 1
          fi

          cp "$APK_PATH" "dist/yuukilyrics-${VERSION}+${BUILD}-release.apk"

          echo "Artifact prepared:"
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuukilyrics-android-apk
          path: dist/yuukilyrics-${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
